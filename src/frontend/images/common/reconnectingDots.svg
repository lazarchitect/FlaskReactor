<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>
    <linearGradient id='opacityScale'>
        <stop offset='0' stop-opacity='0'/>
        <stop offset='1'/>
    </linearGradient>

    <circle fill='none' stroke='url(#opacityScale)'
            stroke-width='25' stroke-linecap='round'
            stroke-dasharray='0 44 0 44 0 44 0 44 0 360'
            cx='100' cy='100' r='70' transform-origin='center'>
        <animateTransform type='rotate' attributeName='transform'
                          calcMode='discrete' dur='1.3'
                          values='360;324;288;252;216;180;144;108;72;36'
                          repeatCount='indefinite'>

        </animateTransform>
    </circle>
</svg>